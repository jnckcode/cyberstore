<VirtualHost *:80>
    ServerName cyberstore.domainkamu.com

    ProxyPreserveHost On
    ProxyRequests Off

    RequestHeader set X-Forwarded-Proto "http"

    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog ${APACHE_LOG_DIR}/cyberstore-error.log
    CustomLog ${APACHE_LOG_DIR}/cyberstore-access.log combined
</VirtualHost>

<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerName cyberstore.domainkamu.com

        ProxyPreserveHost On
        ProxyRequests Off

        RequestHeader set X-Forwarded-Proto "https"

        ProxyPass / http://127.0.0.1:3000/
        ProxyPassReverse / http://127.0.0.1:3000/

        ErrorLog ${APACHE_LOG_DIR}/cyberstore-error.log
        CustomLog ${APACHE_LOG_DIR}/cyberstore-access.log combined

        SSLEngine on
        SSLCertificateFile /etc/letsencrypt/live/cyberstore.domainkamu.com/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/cyberstore.domainkamu.com/privkey.pem
        Include /etc/letsencrypt/options-ssl-apache.conf
    </VirtualHost>
</IfModule>
